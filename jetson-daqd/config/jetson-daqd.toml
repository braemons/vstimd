# /etc/braemons/jetson-daqd/jetson-daqd.toml
# Jetson GPIO ↔ VTL trigger-line bridge configuration.
#
# GPIO line offsets are kernel line numbers within the chip (not 40-pin header
# pin numbers).  Use `gpioinfo` to list all lines and their current state.
#
# Jetson Orin Nano: /dev/gpiochip0 = tegra234-gpio (164 lines)
#                   /dev/gpiochip1 = tegra234-gpio-aon (32 lines)

[vtl]
# POSIX shared memory name created by vstimd.
shm_name = "/vstimd_vtl"

[gpio]
chip = "/dev/gpiochip0"

# ── Output lines ──────────────────────────────────────────────────────────────
# vstimd writes output_state; this daemon drives these pins to match.
# Polled at ~1 kHz.
#
# [[outputs]]
# name      = "stim_onset"   # must match the name vstimd registers in VTL
# vtl_bank  = 0
# vtl_bit   = 0
# gpio_line = 79             # tegra234 offset 79 → 40-pin header pin 29

# ── Input lines ───────────────────────────────────────────────────────────────
# This daemon watches for GPIO edges and writes input_state + rise/fall latches.
# Uses kernel blocking event handles (no busy-wait).
#
# [[inputs]]
# name      = "scanner_trigger"
# vtl_bank  = 0
# vtl_bit   = 0
# gpio_line = 77             # tegra234 offset 77 → 40-pin header pin 26
# edge      = "rising"       # "rising" | "falling" | "both"
