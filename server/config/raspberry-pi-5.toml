# vstimd rig-config — Raspberry Pi 5
#
# Install to: /etc/braemons/vstimd-rig-config.toml
#
# GPIO on the RPi 5 is provided by the RP1 south-bridge chip at /dev/gpiochip4.
# The 40-pin header exposes GPIO lines 0–27 (BCM numbering) via that chip.
#
# This file configures hardware-specific behaviour that does not change between
# experiments.  Experiment-level settings (stimuli, named VTL lines) go in the
# stim-config passed via --config.

# ── VTL shared memory ─────────────────────────────────────────────────────────
[vtl]
# POSIX shared-memory name — must match shm_name in gpiochip-daqd-config.toml.
shm_name         = "/vstimd_vtl"
# 64 input bits; sufficient for 28 GPIO inputs on RPi 5.
num_input_banks  = 1
# 64 output bits.
num_output_banks = 1

# Vblank trigger: pulsed HIGH immediately after each vblank wait, LOW after the
# GPU command buffer is submitted.  Bit 63 is safe — reserve low bits for GPIO.
[vtl.vblank]
bank = 0
bit  = 63

# ── Display ───────────────────────────────────────────────────────────────────
# Preferred DRM display mode.  RPi 5 supports up to 4Kp60 via HDMI.
# Omit to accept the display's EDID preferred mode.
# Not yet applied — wiring into DRM mode selection is a planned feature.
#
# [display]
# width      = 1920
# height     = 1080
# refresh_hz = 60.0

# ── Thread scheduling ─────────────────────────────────────────────────────────
# CPU core affinity for the render/vblank thread.  Not yet applied.
# RPi 5 has 4 Cortex-A76 cores (0–3), all equal.
#
# [scheduling]
# render_cpu_core = 3
